<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anti Procastination app</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="header">
        <h2>Anti Procastination</h2>
      </div>


      <div class="day-timer">
        <div>
        ⏳ Day ends in: <span id="dayTimer">00:00:00</span>
        </div>
        <p>Sun Mar 20 2026</p>
      </div>

      <!-- Emotional Message -->
      <!-- <div class="message" id="message">Kitne din maze karega bhai</div> -->
      <!-- DAILY PROGRESS -->
      <div class="daily-stats">
        <div class="streak-box">🔥 Streak: <span id="streak">0</span> days</div>

        <div class="progress-box">
          ✅ Today: <span id="todayCount">0</span> / 5
        </div>
      </div>

      <!-- Input -->
      <div class="task-input">
        <input type="text" placeholder="Add a task (max 5)" />
        <button class="time-btn" data-time="5">5 min</button>
        <button class="time-btn" data-time="15">15 min</button>
        <button class="time-btn" data-time="25">25 min</button>
      <button class="time-btn" data-time="60">60 min</button>
      <button class="add-btn">Add</button>
      </div>



      <!-- Task List -->
      <div class="task-list" id="taskList"></div>

      <!-- Score Section -->
      <div class="scoreboard">
        <div>Total Score: <span id="score">0</span></div>
      </div>

      <!-- Message -->
      <div class="message" id="message">Kyo nahi ho rhi hai padai</div>

      <!-- for reason -->
      <div class="popup-overlay" id="popup">
        <div class="popup-box">
          <p>Why did you skip?</p>
          <input
            type="text"
            id="ReasonPopupInput"
            placeholder="1 line reason..."
          />
          <div class="popup-actions">
            <button id="saveReason">Save</button>
            <button id="cancelPopup">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
